name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go vet ./...
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: make build

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/bbroker

  docker:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.proxy
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bbroker-proxy:latest
          platforms: linux/amd64,linux/arm64
      - name: Build and push defender
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.defender
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bbroker-defender:latest
          platforms: linux/amd64,linux/arm64
      - name: Build and push xvfb
        uses: docker/build-push-action@v6
        with:
          context: deploy/xvfb
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bbroker-xvfb:latest
          platforms: linux/amd64,linux/arm64
