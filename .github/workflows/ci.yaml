name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go vet ./...
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: make build

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/bbroker

  docker:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/bbroker-proxy
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.proxy
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bbroker-proxy:latest
            ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
      - name: Docker meta (warden)
        id: meta-warden
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bbroker-warden
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push warden
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.warden
          push: true
          tags: ${{ steps.meta-warden.outputs.tags }}
          platforms: linux/amd64,linux/arm64
      - name: Docker meta (xvfb)
        id: meta-xvfb
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bbroker-xvfb
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push xvfb
        uses: docker/build-push-action@v6
        with:
          context: deploy/xvfb
          push: true
          tags: ${{ steps.meta-xvfb.outputs.tags }}
          platforms: linux/amd64,linux/arm64
      - name: Docker meta (chrome)
        id: meta-chrome
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bbroker-chrome
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push chrome
        uses: docker/build-push-action@v6
        with:
          context: deploy/chrome
          push: true
          tags: ${{ steps.meta-chrome.outputs.tags }}
          platforms: linux/amd64,linux/arm64
