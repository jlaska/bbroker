apiVersion: v1
kind: Service
metadata:
  name: bbrokerd
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: bbrokerd
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: bbrokerd
  ports:
    - name: ws
      port: {{ .Values.service.port }}
      targetPort: ws
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
