---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bbrokerd
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: bbrokerd
    app.kubernetes.io/instance: {{ .Release.Name }}
---
# bbrokerd needs to create/delete/watch pods in the browser namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bbrokerd
  namespace: {{ .Values.browserNamespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bbrokerd
  namespace: {{ .Values.browserNamespace }}
subjects:
  - kind: ServiceAccount
    name: bbrokerd
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: bbrokerd
  apiGroup: rbac.authorization.k8s.io
---
# bbroker-defender sidecar needs to delete its own pod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bbroker-browser
  namespace: {{ .Values.browserNamespace }}
  labels:
    app.kubernetes.io/name: bbroker-browser
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bbroker-browser
  namespace: {{ .Values.browserNamespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
    # Scoped to pods with the bbroker label (best-effort; RBAC can't filter by label).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bbroker-browser
  namespace: {{ .Values.browserNamespace }}
subjects:
  - kind: ServiceAccount
    name: bbroker-browser
    namespace: {{ .Values.browserNamespace }}
roleRef:
  kind: Role
  name: bbroker-browser
  apiGroup: rbac.authorization.k8s.io
